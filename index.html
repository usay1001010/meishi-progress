<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>名刺一括登録 進捗</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; margin: 0; padding: 20px; background: #0f172a; color: #e2e8f0; }
  h1 { margin: 0 0 8px; font-size: 20px; }
  .sub { color: #94a3b8; font-size: 12px; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 18px; }
  .card { background: #1e293b; padding: 12px 14px; border-radius: 8px; }
  .card .label { font-size: 10px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.05em; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .bar { height: 18px; background: #334155; border-radius: 9px; overflow: hidden; margin: 6px 0 6px; position: relative; }
  .bar > div { height: 100%; background: linear-gradient(90deg,#22c55e,#16a34a); transition: width .4s; }
  .bar .lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #e2e8f0; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,.6); }
  .bar.sm { height: 10px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; font-size: 13px; }
  th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid #334155; vertical-align: middle; }
  th { background: #0f172a; color: #94a3b8; font-weight: 500; font-size: 11px; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .warn { color: #fbbf24; }
  .muted { color: #94a3b8; font-size: 12px; }
  section { margin-bottom: 20px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #334155; }
  .pill.sh { background: #7c3aed; }
  .pill.kk { background: #0ea5e9; }
  .pill.new { background: #16a34a; }
  .pill.upd { background: #d97706; }
  code { background: #0f172a; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  a { color: #60a5fa; text-decoration: none; font-size: 12px; }
  a:hover { text-decoration: underline; }
  .current-big { font-size: 16px; margin-top: 6px; }
  h2 { font-size: 13px; color:#94a3b8; margin:14px 0 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
  .group-row { display: grid; grid-template-columns: 60px 1fr 90px; gap: 10px; align-items: center; padding: 6px 0; font-size: 12px; }
  .group-row .name { font-weight: 600; }
  .group-row .stats { color: #94a3b8; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<h1>名刺一括登録 進捗</h1>
<div class="sub" id="status">接続中…</div>

<section>
  <div class="bar"><div id="progress-bar" style="width:0%"></div><span class="lbl" id="progress-label">0%</span></div>
  <div class="muted" id="progress-text"></div>
</section>

<section class="grid" id="stats"></section>

<section>
  <h2>現在処理中</h2>
  <div class="card current-big" id="current">—</div>
</section>

<section>
  <h2>グループ別</h2>
  <div id="groups"></div>
</section>

<section>
  <h2>直近のイベント（最新20件）</h2>
  <table id="recent"><thead><tr><th>Key</th><th>Status</th><th>種別</th><th>Notion</th><th>Note</th></tr></thead><tbody></tbody></table>
</section>

<div class="sub" id="last-update">—</div>

<script>
function fmt(sec){
  if(!sec || sec<=0) return "—";
  sec = Math.round(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  const parts = [];
  if(h) parts.push(h+"h");
  if(m || h) parts.push(m+"m");
  parts.push(s+"s");
  return parts.join(" ");
}
function statCard(label, value, cls){
  return `<div class="card"><div class="label">${label}</div><div class="value ${cls||''}">${value}</div></div>`;
}
function groupRow(k, g){
  const done = (g.success||0)+(g.failed||0);
  const p = g.total ? (done/g.total*100) : 0;
  return `<div class="group-row">
    <div class="name">${k}</div>
    <div class="bar sm"><div style="width:${p.toFixed(1)}%"></div></div>
    <div class="stats">${done}/${g.total} <span class="${g.failed?'err':''}">${g.failed?('✕'+g.failed):''}</span></div>
  </div>`;
}

async function tick(){
  try {
    const r = await fetch("./progress.json?t="+Date.now(), {cache:"no-store"});
    if(!r.ok){ throw new Error("HTTP "+r.status); }
    const s = await r.json();
    if(s.status === "not_started"){
      document.getElementById("status").textContent = "まだ開始されていません (progress.json 無し)";
      return;
    }
    const total = s.total || 0;
    const completed = (s.success||0)+(s.failed||0)+(s.skipped_already_done||0);
    const pct = total ? (completed/total*100) : 0;
    document.getElementById("progress-bar").style.width = pct.toFixed(2)+"%";
    document.getElementById("progress-label").textContent = pct.toFixed(1)+"%";
    document.getElementById("progress-text").textContent =
      `${completed} / ${total}件  経過 ${fmt(s.elapsed_sec)}  残り ${fmt(s.eta_sec)}`;

    document.getElementById("stats").innerHTML = [
      statCard("Total", total),
      statCard("Success", s.success||0, "ok"),
      statCard("新規", s.created||0, "ok"),
      statCard("更新", s.updated||0, "ok"),
      statCard("Failed", s.failed||0, (s.failed>0?"err":"")),
      statCard("Low-conf", s.low_confidence_warnings||0, "warn"),
      statCard("Skipped", s.skipped_already_done||0, "muted"),
      statCard("Mode", s.dry_run ? "DRY-RUN" : "LIVE", s.dry_run?"warn":"ok"),
    ].join("");

    const cur = s.current;
    if(cur){
      const typ = cur.is_sh ? 'SH' : '顧客';
      const pcls = cur.is_sh ? 'sh' : 'kk';
      const group = (cur.key||"").split("/")[0];
      const file = (cur.key||"").split("/").slice(1).join("/");
      document.getElementById("current").innerHTML =
        `<div><span class="pill ${pcls}">${typ}</span> グループ <code>${group}</code> / 画像 <code>${file||'—'}</code></div>
         <div class="muted" style="margin-top:6px;">${cur.idx}件目 / confidence ${cur.confidence ?? '—'} ${cur.low_confidence?'<span class="warn">⚠ low-conf</span>':''}</div>`;
    } else if(s.finished_at) {
      document.getElementById("current").innerHTML = `<span class="ok">✓ 完了 ${s.finished_at}</span>`;
    } else if(s.started_at) {
      document.getElementById("current").innerHTML = `<span class="muted">待機中…</span>`;
    }

    document.getElementById("groups").innerHTML =
      Object.entries(s.by_group||{}).map(([k,g])=>groupRow(k,g)).join("") || '<div class="muted">—</div>';

    const rbody = document.querySelector("#recent tbody");
    rbody.innerHTML = (s.recent||[]).map(e=>{
      const cls = e.status==="ok" ? "ok" : "err";
      let actPill = "";
      if(e.action==="created") actPill = '<span class="pill new">新規</span>';
      else if(e.action==="updated") actPill = '<span class="pill upd">更新</span>';
      const link = e.notion_url ? `<a href="${e.notion_url}" target="_blank" rel="noopener">開く ↗</a>` : '';
      return `<tr><td><code>${e.key}</code></td><td class="${cls}">${e.status}</td><td>${actPill}</td><td>${link}</td><td class="muted">${e.error||(e.low_confidence?'low-conf':'')}</td></tr>`;
    }).join("") || '<tr><td colspan="5" class="muted">—</td></tr>';

    document.getElementById("status").textContent =
      (s.finished_at ? "完了: "+s.finished_at : (s.started_at ? "開始: "+s.started_at : ""));
    document.getElementById("last-update").textContent = "最終更新: " + new Date().toLocaleTimeString("ja-JP");
  } catch(e){
    document.getElementById("status").textContent = "再試行中… "+e.message;
  }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
